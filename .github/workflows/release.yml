name: Android Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create google-services.json
        run: echo '${{ secrets.DATA_GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Sign APK
        id: sign_app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > release.jks
          
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks release.jks \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASSWORD \
            --out app-release-signed.apk \
            $APK_PATH
            
          echo "signed_apk=app-release-signed.apk" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release-signed.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: "Automatic release of Palabrín version ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
